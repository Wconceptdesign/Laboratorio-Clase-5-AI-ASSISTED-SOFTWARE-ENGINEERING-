version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: assistance_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: assistance_db
    ports:
      - '5435:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: assistance_backend
    restart: always
    environment:
      DATABASE_URL: 'postgresql://admin:password123@assistance_postgres:5432/assistance_db?schema=public'
    ports:
      - '3010:3000'
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: assistance_frontend
    restart: always
    environment:
      VITE_API_URL: 'http://localhost:3010'
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  pgdata:
